name: Test get release by releaseName with searchLimit
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          releaseName: "v1.1.1"
          searchLimit: "10"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: cardinalby/git-get-release-action
      - name: Assert id output is set
        env:
          ACTUAL: ${{ steps.action.outputs.id }}
        run: |
          echo "actual id: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected id to be non-empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert name output is set
        env:
          ACTUAL: ${{ steps.action.outputs.name }}
        run: |
          echo "actual name: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected name to be non-empty"
            exit 1
          fi
          echo "PASS"
