name: Test get release by tag
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          tag: "v4.2.2"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: actions/checkout
      - name: Assert tag_name matches
        env:
          ACTUAL: ${{ steps.action.outputs.tag_name }}
        run: |
          echo "actual tag_name: $ACTUAL"
          if [ "$ACTUAL" != "v4.2.2" ]; then
            echo "FAIL: expected tag_name to be 'v4.2.2', got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
      - name: Assert id is set
        env:
          ACTUAL: ${{ steps.action.outputs.id }}
        run: |
          echo "actual id: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected id to be non-empty"
            exit 1
          fi
          echo "PASS"
