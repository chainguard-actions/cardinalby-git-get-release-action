name: Test get release by commitSha
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: actions/checkout
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          commitSha: "f43a0e5ff2bd294095638e18286ca9a3d1956744"
          searchLimit: "30"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: actions/checkout
      - name: Assert outputs are non-empty
        env:
          TAG_NAME: ${{ steps.action.outputs.tag_name }}
          RELEASE_ID: ${{ steps.action.outputs.id }}
        run: |
          echo "tag_name: $TAG_NAME"
          echo "id: $RELEASE_ID"
          if [ -z "$TAG_NAME" ]; then
            echo "FAIL: tag_name output is empty"
            exit 1
          fi
          if [ -z "$RELEASE_ID" ]; then
            echo "FAIL: id output is empty"
            exit 1
          fi
          echo "PASS"
