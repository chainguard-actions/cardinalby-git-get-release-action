name: Test get release by commitSha
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Get commit SHA for v1.1.1 tag via API
        id: get-sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the commit SHA that the v1.1.1 tag points to
          SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/git/refs/tags/v1.1.1" \
            | python3 -c "
import sys, json
d = json.load(sys.stdin)
obj = d.get('object', {})
sha = obj.get('sha', '')
obj_type = obj.get('type', '')
print(sha)
")
          echo "commit_sha=$SHA" >> $GITHUB_OUTPUT
          echo "Found SHA: $SHA"
      - id: action
        uses: .
        with:
          commitSha: ${{ steps.get-sha.outputs.commit_sha }}
          searchLimit: "10"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Assert id output is set
        env:
          ACTUAL: ${{ steps.action.outputs.id }}
        run: |
          echo "actual id: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected id to be non-empty"
            exit 1
          fi
          echo "PASS"
